name: Update jdkdb - checksums (only dmg/pkg)
on:
  workflow_dispatch:
    inputs:
      limit-progress:
        description: 'Limit progress updates (0 for no limit)'
        required: true
        type: number
        default: 0
      limit-total:
        description: 'Limit total updates (0 for no limit)'
        required: true
        type: number
        default: 50
      randomize:
        description: 'Randomize the order of updates'
        required: true
        type: boolean
        default: true
      do_commit:
        description: 'Commit the changes after updating checksums'
        required: true
        type: boolean
        default: true
  workflow_call:
    inputs:
      limit-progress:
        description: 'Limit progress updates (0 for no limit)'
        required: false
        type: number
        default: 0
      limit-total:
        description: 'Limit total updates (0 for no limit)'
        required: false
        type: number
        default: 50
      randomize:
        description: 'Randomize the order of updates'
        required: false
        type: boolean
        default: true
      do_commit:
        description: 'Commit the changes after updating checksums'
        required: false
        type: boolean
        default: true
      branch:
        description: 'Branch to commit to (leave empty to use current branch)'
        required: false
        type: string
        default: ''
    outputs:
      changes_detected:
        description: 'Whether the commit step detected and committed any changes'
        value: ${{ jobs.process.outputs.changes_detected }}
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  process:
    runs-on: 'macos-latest'
    outputs:
      changes_detected: ${{ steps.commit.outputs.changes_detected }}
    env:
      APP: https://github.com/jbangdev/jdkdb-scraper/releases/latest/download/jdkdb-scraper-standalone.jar
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        ref: ${{ inputs.branch || github.ref }}

    - name: Set up JDK 21
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
      with:
        java-version: '21'
        distribution: 'temurin'
    
    - name: Setup JBang
      uses: jbangdev/setup-jbang@312c53a4221283f9c8e4aa84d8261b82f0c680fb # main

    - name: Run downloader
      env:
        GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        EXTRA_OPTS="--include pkg,dmg"
        if [ "${{ inputs.limit-progress }}" != "0" ]; then
          EXTRA_OPTS="$EXTRA_OPTS --limit-progress ${{ inputs.limit-progress }}"
        fi
        if [ "${{ inputs.limit-total }}" != "0" ]; then
          EXTRA_OPTS="$EXTRA_OPTS --limit-total ${{ inputs.limit-total }}"
        fi
        if [ "${{ inputs.randomize }}" == "true" ]; then
          EXTRA_OPTS="$EXTRA_OPTS --randomize"
        fi
        echo "Running update with: $EXTRA_OPTS"
        jbang --java 21+ $APP --version
        jbang --java 21+ $APP download $EXTRA_OPTS

    - name: Commit & Push changes
      id: commit
      uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7
      if: inputs.do_commit
      with:
        commit_message: "Update checksums (pkg/dmg only)"
        branch: ${{ inputs.branch || github.ref_name }}

    - name: Upload log files
      uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
      if: always()
      with:
        name: download-mac-logs
        path: logs/**/*.log
        retention-days: 30

name: Update jdkdb - metadata
on:
  workflow_dispatch:
    inputs:
      limit-progress:
        description: 'Limit progress updates (0 for no limit)'
        required: true
        type: number
        default: 10
      limit-total:
        description: 'Limit total updates (0 for no limit)'
        required: true
        type: number
        default: 100
      do_commit:
        description: 'Commit the changes after updating metadata'
        required: true
        type: boolean
        default: true
  workflow_call:
    inputs:
      limit-progress:
        description: 'Limit progress updates (0 for no limit)'
        required: false
        type: number
        default: 10
      limit-total:
        description: 'Limit total updates (0 for no limit)'
        required: false
        type: number
        default: 100
      do_commit:
        description: 'Commit the changes after updating metadata'
        required: false
        type: boolean
        default: true
      branch:
        description: 'Branch to commit to (leave empty to use current branch)'
        required: false
        type: string
        default: ''
    outputs:
      changes_detected:
        description: 'Whether the commit step detected and committed any changes'
        value: ${{ jobs.update.outputs.changes_detected }}
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  update:
    runs-on: 'ubuntu-latest'
    outputs:
      changes_detected: ${{ steps.commit.outputs.changes_detected }}
    steps:
    - uses: actions/checkout@v6
      with:
        ref: ${{ inputs.branch || github.ref }}

    - name: Setup JBang
      uses: jbangdev/setup-jbang@main

    - name: Run scrapers
      env:
        GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        APP=https://github.com/jbangdev/jdkdb-scraper/releases/latest/download/jdkdb-scraper-standalone.jar
        EXTRA_OPTS=""
        if [ "${{ inputs.limit-progress }}" != "0" ]; then
          EXTRA_OPTS="--limit-progress ${{ inputs.limit-progress }}"
        fi
        if [ "${{ inputs.limit-total }}" != "0" ]; then
          EXTRA_OPTS="$EXTRA_OPTS --limit-total ${{ inputs.limit-total }}"
        fi
        echo "Running update with: $EXTRA_OPTS"
        jbang --java 21+ $APP --version
        jbang --java 21+ $APP update $EXTRA_OPTS

    - name: Commit & Push changes
      id: commit
      uses: stefanzweifel/git-auto-commit-action@v7
      if: inputs.do_commit
      with:
        commit_message: "Update release metadata"
        branch: ${{ inputs.branch || github.ref_name }}

    - name: Upload log files
      uses: actions/upload-artifact@v6
      if: always()
      with:
        name: update-logs
        path: logs/**/*.log
        retention-days: 30

name: Update jdkdb - metadata
on:
  schedule:
    - cron: '0 2 * * *'
      timezone: 'UTC'
  workflow_dispatch:
    inputs:
      limit-progress:
        description: 'Limit progress updates (0 for no limit)'
        required: true
        type: number
        default: 10
      limit-total:
        description: 'Limit total updates (0 for no limit)'
        required: true
        type: number
        default: 100
      download:
        description: 'Download JDKs to update metadata with checksums'
        required: true
        type: boolean
        default: false
      index:
        description: 'Create indices for the updated metadata'
        required: true
        type: boolean
        default: true
      do_commit:
        description: 'Commit the changes after updating metadata'
        required: true
        type: boolean
        default: true
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  update:
    runs-on: 'ubuntu-latest'
    steps:
    - uses: actions/checkout@v6

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y binutils cpio rpm2cpio msitools

    - name: Setup JBang
      uses: jbangdev/setup-jbang@main

    - name: Run scrapers manually
      if: github.event_name == 'workflow_dispatch'
      env:
        GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        APP=https://github.com/jbangdev/jdkdb-scraper/releases/latest/download/jdkdb-scraper-standalone.jar
        EXTRA_OPTS=""
        if [ "${{ inputs.limit-progress }}" != "0" ]; then
          EXTRA_OPTS="--limit-progress ${{ inputs.limit-progress }}"
        fi
        if [ "${{ inputs.limit-total }}" != "0" ]; then
          EXTRA_OPTS="$EXTRA_OPTS --limit-total ${{ inputs.limit-total }}"
        fi
        if [ "${{ inputs.download }}" = "false" ]; then
          EXTRA_OPTS="$EXTRA_OPTS --no-download"
        fi
        if [ "${{ inputs.index }}" = "false" ]; then
          EXTRA_OPTS="$EXTRA_OPTS --no-index"
        fi
        echo "Running update with: $EXTRA_OPTS"
        jbang --java 21+ $APP --version
        jbang --java 21+ $APP update $EXTRA_OPTS

    - name: Run scrapers on schedule
      if: github.event_name == 'schedule'
      env:
        GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        APP=https://github.com/jbangdev/jdkdb-scraper/releases/latest/download/jdkdb-scraper-standalone.jar
        EXTRA_OPTS="--no-download --no-index"
        echo "Running update with: $EXTRA_OPTS"
        jbang --java 21+ $APP --version
        jbang --java 21+ $APP update $EXTRA_OPTS

    - name: Commit & Push changes
      uses: stefanzweifel/git-auto-commit-action@v7
      if: github.event_name == 'schedule' || inputs.do_commit
      with:
        commit_message: "Update release metadata"

    - name: Upload log files
      uses: actions/upload-artifact@v6
      if: always()
      with:
        name: update-logs
        path: logs/**/*.log
        retention-days: 30
